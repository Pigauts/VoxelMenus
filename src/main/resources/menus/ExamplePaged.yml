type: page_view

title: 'example menu'

rows: 6

refresh: 200

animation: none

bottom-view-movement: true

on-open:
  SOUND: 'mySound'
  ANIMATION: 'myAnimation'

on-close:
  SOUND: 'mySound'

on-place-item:
  example_1:
    placed:
      my_item: 22
      another_item: 23
    function:
      VAULT_GIVE: 100

on-item-click: {}

view:
  type: CUSTOM  # PLAYERS, MATERIALS, CUSTOM
  placeholder: '%value%'
  template:
    name: '%value%'
    lore: [ click to open player menu ]
    function:
      COMMAND: 'pv %value%'
      MESSAGE: You opened %value% player view
  custom:
    DIRT: dirt_value
    GRASS: grass_value
    item: value

# '0' is reserved for view items
layout:
  - 'A A A A A A A A A'
  - 'A 0 0 0 0 0 0 0 A'
  - 'A 0 0 0 0 0 0 0 A'
  - 'A 0 0 0 0 0 0 0 A'
  - 'A A A P C N A A A'

icons: # ['_', 'n'] are reserved for null (empty slots), you can use any other character (abcd1234*#@&)
  C:
    material: barrier
    name: 'Close menu'
    function: close_menu
  N:
    material: arrow
    name: 'Next Page'
    function: next_page
  P:
    material: arrow
    name: 'Previous Page'
    function: previous_page
  A:
    material: black stained glass pane
    amount: 1
    name: ' '
    lore: [""]
    model-data: -1
    enchanted: false
    function: my_function

functions:
  my_function:
    1:
      type: simple_condition
      click: [ LEFT, SHIFT_LEFT ]
      condition: { }
      success: { }
      failure: { }
      ACTION1: arst
      ACTION2: arst